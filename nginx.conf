# ──────────────────────────────────────────────────────────────
# nginx config for Market Pulse AI
# Copy to: /etc/nginx/sites-available/market-pulse
# Then:    sudo ln -s /etc/nginx/sites-available/market-pulse /etc/nginx/sites-enabled/
#          sudo nginx -t && sudo systemctl reload nginx
# ──────────────────────────────────────────────────────────────

server {
    listen 80;
    server_name _;               # Replace _ with your domain e.g. marketpulse.example.com

    # ── Gzip compression ──────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/x-javascript text/xml
               application/xml application/xml+rss image/svg+xml;

    # ── Frontend static files ─────────────────────────────────
    root /var/www/market-pulse/artifacts/stock-dashboard/dist/public;
    index index.html;

    # Cache built assets (JS/CSS have content hashes in filenames)
    location ~* \.(js|css|woff2|woff|ttf|svg|ico|png|jpg|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ── API proxy → Express on port 3001 ─────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback (React Router / client-side routing) ────
    location / {
        try_files $uri $uri/ /index.html;
    }
}
