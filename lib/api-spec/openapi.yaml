openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: NSE Stock Market Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: giftnifty
    description: Gift Nifty data
  - name: nse
    description: NSE Indian stock market
  - name: portfolio
    description: User portfolio
  - name: settings
    description: API settings

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /gift-nifty/quote:
    get:
      operationId: getGiftNiftyQuote
      tags: [giftnifty]
      summary: Get Gift Nifty current quote
      description: Returns Gift Nifty current price, yesterday high/low and change percentage
      responses:
        "200":
          description: Gift Nifty quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftNiftyQuote"

  /gift-nifty/history:
    get:
      operationId: getGiftNiftyHistory
      tags: [giftnifty]
      summary: Get Gift Nifty price history
      description: Returns Gift Nifty historical data for last 3 months
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1M, 3M, 6M]
            default: 3M
      responses:
        "200":
          description: Gift Nifty history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"

  /nse/movers:
    get:
      operationId: getNseMovers
      tags: [nse]
      summary: Get NSE top gainers and losers
      description: Returns top 10 NSE gainers and top 10 NSE losers
      responses:
        "200":
          description: NSE movers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NseMovers"

  /nse/sectors:
    get:
      operationId: getNseSectors
      tags: [nse]
      summary: Get NSE sector performance
      description: Returns performance of all NSE sectors
      responses:
        "200":
          description: NSE sector performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectorPerf"

  /nse/quote/{symbol}:
    get:
      operationId: getNseQuote
      tags: [nse]
      summary: Get NSE stock quote
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NSE stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NseStock"

  /nse/history/{symbol}:
    get:
      operationId: getNseHistory
      tags: [nse]
      summary: Get NSE stock history
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1D, 1W, 1M, 3M, 6M, 1Y]
            default: 1M
      responses:
        "200":
          description: NSE stock history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get portfolio stocks
      responses:
        "200":
          description: Portfolio stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioStock"
    post:
      operationId: addPortfolioStock
      tags: [portfolio]
      summary: Add stock to portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPortfolioStockRequest"
      responses:
        "200":
          description: Added stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioStock"

  /portfolio/{symbol}:
    delete:
      operationId: removePortfolioStock
      tags: [portfolio]
      summary: Remove stock from portfolio
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /portfolio/{symbol}/indicators:
    get:
      operationId: getStockIndicators
      tags: [portfolio]
      summary: Get VWAP and RSI indicators for a stock
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockIndicators"

  /settings/upstox:
    get:
      operationId: getUpstoxSettings
      tags: [settings]
      summary: Get Upstox API connection status
      responses:
        "200":
          description: Upstox settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstoxSettings"
    post:
      operationId: saveUpstoxSettings
      tags: [settings]
      summary: Save Upstox API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveUpstoxSettingsRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstoxSettings"

  /settings/upstox/disconnect:
    post:
      operationId: disconnectUpstox
      tags: [settings]
      summary: Disconnect Upstox API
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GiftNiftyQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        yesterdayHigh:
          type: number
        yesterdayLow:
          type: number
        yesterdayClose:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        volume:
          type: number
        updatedAt:
          type: string
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - yesterdayHigh
        - yesterdayLow
        - yesterdayClose
        - open
        - high
        - low
        - volume
        - updatedAt

    PriceHistory:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/OHLCV"
      required:
        - symbol
        - period
        - data

    OHLCV:
      type: object
      properties:
        timestamp:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume

    NseStock:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        previousClose:
          type: number
        volume:
          type: number
        marketCap:
          type: number
        sector:
          type: string
        pe:
          type: number
        week52High:
          type: number
        week52Low:
          type: number
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - open
        - high
        - low
        - previousClose
        - volume
        - marketCap
        - sector
        - pe
        - week52High
        - week52Low

    NseMovers:
      type: object
      properties:
        gainers:
          type: array
          items:
            $ref: "#/components/schemas/NseStock"
        losers:
          type: array
          items:
            $ref: "#/components/schemas/NseStock"
        timestamp:
          type: string
      required:
        - gainers
        - losers
        - timestamp

    SectorPerf:
      type: object
      properties:
        sector:
          type: string
        index:
          type: string
        changePercent:
          type: number
        change:
          type: number
        value:
          type: number
        advancers:
          type: integer
        decliners:
          type: integer
      required:
        - sector
        - index
        - changePercent
        - change
        - value
        - advancers
        - decliners

    PortfolioStock:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        exchange:
          type: string
        addedAt:
          type: string
        buyPrice:
          type: number
        quantity:
          type: integer
      required:
        - id
        - symbol
        - exchange
        - addedAt

    AddPortfolioStockRequest:
      type: object
      properties:
        symbol:
          type: string
        exchange:
          type: string
        buyPrice:
          type: number
        quantity:
          type: integer
      required:
        - symbol

    StockIndicators:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        vwap:
          type: number
        vwapSignal:
          type: string
          enum: [ABOVE, BELOW, AT]
        vwapDeviation:
          type: number
        rsi:
          type: number
        rsiSignal:
          type: string
          enum: [OVERSOLD, NEUTRAL, OVERBOUGHT]
        smartMoneyFlow:
          type: string
          enum: [ACCUMULATION, DISTRIBUTION, NEUTRAL]
        momentum:
          type: string
          enum: [STRONG_UP, UP, NEUTRAL, DOWN, STRONG_DOWN]
        history:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        updatedAt:
          type: string
      required:
        - symbol
        - price
        - vwap
        - vwapSignal
        - vwapDeviation
        - rsi
        - rsiSignal
        - smartMoneyFlow
        - momentum
        - history
        - updatedAt

    IndicatorPoint:
      type: object
      properties:
        timestamp:
          type: string
        close:
          type: number
        vwap:
          type: number
        rsi:
          type: number
        volume:
          type: number
      required:
        - timestamp
        - close
        - vwap
        - rsi
        - volume

    UpstoxSettings:
      type: object
      properties:
        connected:
          type: boolean
        apiKeyMasked:
          type: string
        clientId:
          type: string
        connectedAt:
          type: string
        liveDataEnabled:
          type: boolean
      required:
        - connected
        - liveDataEnabled

    SaveUpstoxSettingsRequest:
      type: object
      properties:
        apiKey:
          type: string
        apiSecret:
          type: string
        clientId:
          type: string
        accessToken:
          type: string
      required:
        - apiKey
