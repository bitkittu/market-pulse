openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: NSE Stock Market Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: giftnifty
    description: Gift Nifty data
  - name: nse
    description: NSE Indian stock market
  - name: global
    description: Global index data (NYSE, Shanghai, Hang Seng)
  - name: portfolio
    description: User portfolio
  - name: settings
    description: API settings
  - name: insights
    description: Stock insights, indicators and news

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /decision-engine:
    get:
      operationId: getDecisionPanel
      tags: [decision]
      summary: Get full trading decision panel
      description: Returns market status, key levels (pivot points S1/R1/S2/R2), trade decision (BUY/SELL/WAIT), market pressure, money flow, and signals table for top 10 stocks
      responses:
        "200":
          description: Decision panel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionPanel"

  /gift-nifty/quote:
    get:
      operationId: getGiftNiftyQuote
      tags: [giftnifty]
      summary: Get Gift Nifty current quote
      description: Returns Gift Nifty current price, yesterday high/low and change percentage
      responses:
        "200":
          description: Gift Nifty quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GiftNiftyQuote"

  /gift-nifty/history:
    get:
      operationId: getGiftNiftyHistory
      tags: [giftnifty]
      summary: Get Gift Nifty price history
      description: Returns Gift Nifty historical data for last 3 months
      parameters:
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1M, 3M, 6M]
            default: 3M
      responses:
        "200":
          description: Gift Nifty history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"

  /gift-nifty/intraday:
    get:
      operationId: getGiftNiftyIntraday
      tags: [giftnifty]
      summary: Get Gift Nifty intraday chart data (today)
      description: Returns real-time intraday price points from NSE India API. Empty when market is closed.
      responses:
        "200":
          description: Intraday price points
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        timestamp:
                          type: number
                        price:
                          type: number
                        label:
                          type: string
                      required: [timestamp, price, label]
                  closePrice:
                    type: number
                  source:
                    type: string
                required: [data, closePrice, source]

  /global-index/quote:
    get:
      operationId: getGlobalIndexQuote
      tags: [global]
      summary: Get global index current quote (Yahoo Finance ~15m delay)
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
            enum: ["^NYA", "000001.SS", "^HSI", "^NSEI"]
      responses:
        "200":
          description: Global index quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalIndexQuote"

  /global-index/history:
    get:
      operationId: getGlobalIndexHistory
      tags: [global]
      summary: Get global index price history (Yahoo Finance)
      parameters:
        - name: ticker
          in: query
          required: true
          schema:
            type: string
            enum: ["^NYA", "000001.SS", "^HSI", "^NSEI"]
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1M, 3M]
            default: 3M
      responses:
        "200":
          description: Global index history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"

  /nse/movers:
    get:
      operationId: getNseMovers
      tags: [nse]
      summary: Get NSE top gainers and losers
      description: Returns top 10 NSE gainers and top 10 NSE losers
      responses:
        "200":
          description: NSE movers
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NseMovers"

  /nse/sectors:
    get:
      operationId: getNseSectors
      tags: [nse]
      summary: Get NSE sector performance
      description: Returns performance of all NSE sectors
      responses:
        "200":
          description: NSE sector performance
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SectorPerf"

  /nse/quote/{symbol}:
    get:
      operationId: getNseQuote
      tags: [nse]
      summary: Get NSE stock quote
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: NSE stock quote
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NseStock"

  /nse/history/{symbol}:
    get:
      operationId: getNseHistory
      tags: [nse]
      summary: Get NSE stock history
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
        - name: period
          in: query
          required: false
          schema:
            type: string
            enum: [1D, 1W, 1M, 3M, 6M, 1Y]
            default: 1M
      responses:
        "200":
          description: NSE stock history
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PriceHistory"

  /portfolio:
    get:
      operationId: getPortfolio
      tags: [portfolio]
      summary: Get portfolio stocks
      responses:
        "200":
          description: Portfolio stocks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioStock"
    post:
      operationId: addPortfolioStock
      tags: [portfolio]
      summary: Add stock to portfolio
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddPortfolioStockRequest"
      responses:
        "200":
          description: Added stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioStock"

  /portfolio/{symbol}:
    delete:
      operationId: removePortfolioStock
      tags: [portfolio]
      summary: Remove stock from portfolio
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /portfolio/{symbol}/indicators:
    get:
      operationId: getStockIndicators
      tags: [portfolio]
      summary: Get VWAP and RSI indicators for a stock
      parameters:
        - name: symbol
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Stock indicators
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StockIndicators"

  /settings/upstox:
    get:
      operationId: getUpstoxSettings
      tags: [settings]
      summary: Get Upstox API connection status
      responses:
        "200":
          description: Upstox settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstoxSettings"
    post:
      operationId: saveUpstoxSettings
      tags: [settings]
      summary: Save Upstox API credentials
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveUpstoxSettingsRequest"
      responses:
        "200":
          description: Saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstoxSettings"

  /suggestions/intraday:
    get:
      operationId: getIntradaySuggestions
      tags: [suggestions]
      summary: Get top 10 intraday stock suggestions
      description: Returns top 10 NSE stocks suggested for intraday trading based on last 24h signals
      responses:
        "200":
          description: Intraday suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/StockSuggestion"

  /suggestions/options:
    get:
      operationId: getOptionsSuggestions
      tags: [suggestions]
      summary: Get top 10 options stock suggestions
      description: Returns top 10 NSE stocks/indices suggested for options trading
      responses:
        "200":
          description: Options suggestions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OptionsSuggestion"

  /settings/upstox/disconnect:
    post:
      operationId: disconnectUpstox
      tags: [settings]
      summary: Disconnect Upstox API
      responses:
        "200":
          description: Disconnected
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                required:
                  - success

  /settings/upstox/test:
    post:
      operationId: testUpstoxConnection
      tags: [settings]
      summary: Test Upstox API connection with stored credentials
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UpstoxTestResult"

  /insights/search:
    get:
      operationId: searchInsights
      tags: [insights]
      summary: Search stock insights, indicators and news
      parameters:
        - name: q
          in: query
          required: true
          schema:
            type: string
          description: Stock symbol or name (e.g. TCS, RELIANCE, AAPL)
      responses:
        "200":
          description: Stock insights result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InsightsResult"
        "404":
          description: Symbol not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required: [error]
        "500":
          description: Server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                required: [error]

  
components:
  schemas:
    PriceCandle:
      type: object
      properties:
        date:
          type: string
        close:
          type: number
        volume:
          type: number
      required: [date, close, volume]

    NewsArticle:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        url:
          type: string
        source:
          type: string
        publishedAt:
          type: string
        thumbnail:
          type: string
      required: [title, description, url, source, publishedAt, thumbnail]

    InsightsResult:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        rsi:
          type: number
        vwap:
          type: number
        forecast:
          type: string
          enum: [Bullish, Bearish, Neutral]
        sentiment:
          type: string
          enum: [Positive, Negative, Neutral]
        sentimentScore:
          type: number
          description: AI sentiment score 0-100 (0=very negative, 50=neutral, 100=very positive)
        currency:
          type: string
        marketCap:
          type: number
        volume:
          type: number
        fiftyTwoWeekHigh:
          type: number
        fiftyTwoWeekLow:
          type: number
        priceHistory:
          type: array
          items:
            $ref: "#/components/schemas/PriceCandle"
        news:
          type: array
          items:
            $ref: "#/components/schemas/NewsArticle"
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - rsi
        - vwap
        - forecast
        - sentiment
        - sentimentScore
        - currency
        - marketCap
        - volume
        - fiftyTwoWeekHigh
        - fiftyTwoWeekLow
        - priceHistory
        - news

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    GiftNiftyQuote:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        yesterdayHigh:
          type: number
        yesterdayLow:
          type: number
        yesterdayClose:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        yearHigh:
          type: number
        yearLow:
          type: number
        volume:
          type: number
        updatedAt:
          type: string
        dataSource:
          type: string
          description: "Data source: nse | upstox | yahoo | simulated"
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - yesterdayHigh
        - yesterdayLow
        - yesterdayClose
        - open
        - high
        - low
        - volume
        - updatedAt

    PriceHistory:
      type: object
      properties:
        symbol:
          type: string
        period:
          type: string
        data:
          type: array
          items:
            $ref: "#/components/schemas/OHLCV"
      required:
        - symbol
        - period
        - data

    OHLCV:
      type: object
      properties:
        timestamp:
          type: string
        open:
          type: number
        high:
          type: number
        low:
          type: number
        close:
          type: number
        volume:
          type: number
      required:
        - timestamp
        - open
        - high
        - low
        - close
        - volume

    NseStock:
      type: object
      properties:
        symbol:
          type: string
        name:
          type: string
        price:
          type: number
        change:
          type: number
        changePercent:
          type: number
        open:
          type: number
        high:
          type: number
        low:
          type: number
        previousClose:
          type: number
        volume:
          type: number
        marketCap:
          type: number
        sector:
          type: string
        pe:
          type: number
        week52High:
          type: number
        week52Low:
          type: number
      required:
        - symbol
        - name
        - price
        - change
        - changePercent
        - open
        - high
        - low
        - previousClose
        - volume
        - marketCap
        - sector
        - pe
        - week52High
        - week52Low

    NseMovers:
      type: object
      properties:
        gainers:
          type: array
          items:
            $ref: "#/components/schemas/NseStock"
        losers:
          type: array
          items:
            $ref: "#/components/schemas/NseStock"
        timestamp:
          type: string
      required:
        - gainers
        - losers
        - timestamp

    SectorPerf:
      type: object
      properties:
        sector:
          type: string
        index:
          type: string
        changePercent:
          type: number
        change:
          type: number
        value:
          type: number
        advancers:
          type: integer
        decliners:
          type: integer
      required:
        - sector
        - index
        - changePercent
        - change
        - value
        - advancers
        - decliners

    PortfolioStock:
      type: object
      properties:
        id:
          type: integer
        symbol:
          type: string
        exchange:
          type: string
        addedAt:
          type: string
        buyPrice:
          type: number
        quantity:
          type: integer
      required:
        - id
        - symbol
        - exchange
        - addedAt

    AddPortfolioStockRequest:
      type: object
      properties:
        symbol:
          type: string
        exchange:
          type: string
        buyPrice:
          type: number
        quantity:
          type: integer
      required:
        - symbol

    StockIndicators:
      type: object
      properties:
        symbol:
          type: string
        price:
          type: number
        vwap:
          type: number
        vwapSignal:
          type: string
          enum: [ABOVE, BELOW, AT]
        vwapDeviation:
          type: number
        rsi:
          type: number
        rsiSignal:
          type: string
          enum: [OVERSOLD, NEUTRAL, OVERBOUGHT]
        smartMoneyFlow:
          type: string
          enum: [ACCUMULATION, DISTRIBUTION, NEUTRAL]
        momentum:
          type: string
          enum: [STRONG_UP, UP, NEUTRAL, DOWN, STRONG_DOWN]
        history:
          type: array
          items:
            $ref: "#/components/schemas/IndicatorPoint"
        updatedAt:
          type: string
      required:
        - symbol
        - price
        - vwap
        - vwapSignal
        - vwapDeviation
        - rsi
        - rsiSignal
        - smartMoneyFlow
        - momentum
        - history
        - updatedAt

    IndicatorPoint:
      type: object
      properties:
        timestamp:
          type: string
        close:
          type: number
        vwap:
          type: number
        rsi:
          type: number
        volume:
          type: number
      required:
        - timestamp
        - close
        - vwap
        - rsi
        - volume

    UpstoxSettings:
      type: object
      properties:
        connected:
          type: boolean
        apiKeyMasked:
          type: string
        clientId:
          type: string
        connectedAt:
          type: string
        liveDataEnabled:
          type: boolean
        hasAccessToken:
          type: boolean
      required:
        - connected
        - liveDataEnabled

    UpstoxTestResult:
      type: object
      properties:
        ok:
          type: boolean
        source:
          type: string
          enum: [upstox, none]
        message:
          type: string
        samplePrice:
          type: number
        sampleSymbol:
          type: string
      required:
        - ok
        - source
        - message

    SaveUpstoxSettingsRequest:
      type: object
      properties:
        apiKey:
          type: string
        apiSecret:
          type: string
        clientId:
          type: string
        accessToken:
          type: string
      required:
        - apiKey

    StockSuggestion:
      type: object
      properties:
        rank:
          type: integer
        symbol:
          type: string
        name:
          type: string
        currentPrice:
          type: number
        buyBelow:
          type: number
        sellAbove:
          type: number
        stopLoss:
          type: number
        signal:
          type: string
          enum: [STRONG_BUY, BUY, WATCH, SELL, STRONG_SELL]
        changePercent:
          type: number
        change:
          type: number
        volume:
          type: number
        sector:
          type: string
        rationale:
          type: string
        rsi:
          type: number
        vwapStatus:
          type: string
          enum: [ABOVE, BELOW, AT]
        confidence:
          type: number
        riskLevel:
          type: string
          enum: [Low, Medium, High]
        updatedAt:
          type: string
      required:
        - rank
        - symbol
        - name
        - currentPrice
        - buyBelow
        - sellAbove
        - stopLoss
        - signal
        - changePercent
        - change
        - volume
        - sector
        - rationale
        - rsi
        - vwapStatus
        - confidence
        - riskLevel
        - updatedAt

    OptionsSuggestion:
      type: object
      properties:
        rank:
          type: integer
        symbol:
          type: string
        name:
          type: string
        optionType:
          type: string
          enum: [CE, PE]
        strikePrice:
          type: number
        expiry:
          type: string
        currentPrice:
          type: number
        buyBelow:
          type: number
        sellAbove:
          type: number
        stopLoss:
          type: number
        underlyingPrice:
          type: number
        signal:
          type: string
          enum: [STRONG_BUY, BUY, WATCH, SELL, STRONG_SELL]
        changePercent:
          type: number
        change:
          type: number
        volume:
          type: number
        openInterest:
          type: number
        impliedVolatility:
          type: number
        oiTrend:
          type: string
          enum: [Increasing, Decreasing, Stable]
        confidence:
          type: number
        rationale:
          type: string
        updatedAt:
          type: string
      required:
        - rank
        - symbol
        - name
        - optionType
        - strikePrice
        - expiry
        - currentPrice
        - buyBelow
        - sellAbove
        - stopLoss
        - underlyingPrice
        - signal
        - changePercent
        - change
        - volume
        - openInterest
        - impliedVolatility
        - oiTrend
        - confidence
        - rationale
        - updatedAt

    KeyLevels:
      type: object
      properties:
        pivot:      { type: number }
        r1:         { type: number }
        r2:         { type: number }
        r3:         { type: number }
        s1:         { type: number }
        s2:         { type: number }
        s3:         { type: number }
        vwap:       { type: number }
        prevHigh:   { type: number }
        prevLow:    { type: number }
        prevClose:  { type: number }
      required: [pivot, r1, r2, r3, s1, s2, s3, vwap, prevHigh, prevLow, prevClose]

    TradeDecision:
      type: object
      properties:
        action:     { type: string, enum: [BUY, SELL, WAIT] }
        color:      { type: string, enum: [green, red, yellow] }
        buyAbove:   { type: number, nullable: true }
        sellBelow:  { type: number, nullable: true }
        entry:      { type: number }
        stopLoss:   { type: number }
        target:     { type: number }
        riskReward: { type: number }
        timeframe:  { type: string }
        confidence: { type: number }
      required: [action, color, entry, stopLoss, target, riskReward, timeframe, confidence]

    MarketPressure:
      type: object
      properties:
        buyerStrength:  { type: number }
        sellerStrength: { type: number }
        label:          { type: string }
        trend:          { type: string, enum: [BULLISH, BEARISH, NEUTRAL] }
      required: [buyerStrength, sellerStrength, label, trend]

    MoneyFlow:
      type: object
      properties:
        volumeSpike:      { type: boolean }
        oiChange:         { type: string, enum: [UP, DOWN, FLAT] }
        smartMoneySignal: { type: string, enum: [ACCUMULATION, DISTRIBUTION, NEUTRAL] }
        description:      { type: string }
      required: [volumeSpike, oiChange, smartMoneySignal, description]

    GlobalIndexQuote:
      type: object
      properties:
        ticker:        { type: string }
        name:          { type: string }
        price:         { type: number }
        change:        { type: number }
        changePercent: { type: number }
        currency:      { type: string }
        dataSource:    { type: string }
      required: [ticker, name, price, change, changePercent, currency]

    SignalRow:
      type: object
      properties:
        symbol:     { type: string }
        name:       { type: string }
        signal:     { type: string, enum: [BUY, SELL, HOLD] }
        action:     { type: string }
        price:      { type: number }
        entry:      { type: number }
        stopLoss:   { type: number }
        target:     { type: number }
        riskReward: { type: number }
        confidence: { type: number }
      required: [symbol, name, signal, action, price, entry, stopLoss, target, riskReward, confidence]

    DecisionPanel:
      type: object
      properties:
        marketStatus:    { type: string, enum: [BULLISH, BEARISH, SIDEWAYS] }
        confidence:      { type: number }
        tradeDecision:
          $ref: "#/components/schemas/TradeDecision"
        keyLevels:
          $ref: "#/components/schemas/KeyLevels"
        marketPressure:
          $ref: "#/components/schemas/MarketPressure"
        moneyFlow:
          $ref: "#/components/schemas/MoneyFlow"
        signalsTable:
          type: array
          items:
            $ref: "#/components/schemas/SignalRow"
        niftyPrice:    { type: number }
        niftyChange:   { type: number }
        niftyChangePct: { type: number }
        dataSource:    { type: string }
        updatedAt:     { type: string }
      required:
        - marketStatus
        - confidence
        - tradeDecision
        - keyLevels
        - marketPressure
        - moneyFlow
        - signalsTable
        - niftyPrice
        - niftyChange
        - niftyChangePct
        - updatedAt
